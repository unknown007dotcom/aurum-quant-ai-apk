name: Build Android APK

# Builds the Aurum Quant AI Android APK on GitHub's servers and publishes it as
# (1) a downloadable Actions artifact, and (2) a GitHub Release asset.
#
# IMPORTANT: this workflow expects the WHOLE project at the repo root (app.js,
# index.html, modules/, lib/, styles.css, ...) plus the mobile/ folder, because
# mobile/scripts/build-www.mjs bundles the web app from the repo root into the APK.

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: {}   # lets you trigger the build manually from the Actions tab

permissions:
  contents: write   # needed to publish the APK as a GitHub Release asset

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        working-directory: mobile
        run: npm install --no-audit --no-fund

      - name: Build web assets (www/)
        working-directory: mobile
        run: npm run build:www

      - name: Capacitor sync (copies www + plugins into android/)
        working-directory: mobile
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifact
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk artifact/aurum-quant-ai.apk
          ls -lh artifact/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurum-quant-ai-apk
          path: artifact/aurum-quant-ai.apk
          if-no-files-found: error

      - name: Publish APK to a GitHub Release
        continue-on-error: true   # don't fail the whole build if the release step can't write
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Aurum Quant AI - latest APK
          body: |
            Auto-built debug APK for Aurum Quant AI (standalone, on-device backend).
            Build: ${{ github.sha }}
            Download `aurum-quant-ai.apk` below and sideload it on your Android phone.
          files: artifact/aurum-quant-ai.apk
          fail_on_unmatched_files: true
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
